
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Thinking Ahead - Spire 2 Stats</title>
    <link rel="stylesheet" href="/css/main.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
</head>
<body>
    <nav class="breadcrumbs"><a href="/">spire2stats</a> / <a href="/cards/">cards</a> / thinking ahead</nav>

    <div class="stats-summary">
        <h2>Run Data</h2>
        <p>No runs recorded for this card yet.</p>
    </div>

    <div class="sts-card-display">
        <div class="sts-card">
            <div class="cost-circle"></div>
            <div class="card-title">Thinking Ahead</div>
            <div class="type-banner">colorless Skill</div>
            <div class="description">Draw 2 cards.<br>Put 1 card from your <span class="text-gold">Hand</span> on top of your <span class="text-gold">Draw Pile</span>.</div>
            <div class="card-footer">Uncommon</div>
        </div>
        <div class="sts-card-arrow">→</div>
        <div class="sts-card">
            <div class="cost-circle"></div>
            <div class="card-title text-green">Thinking Ahead+</div>
            <div class="type-banner">colorless Skill</div>
            <div class="description">Draw 2 cards.<br>Put 1 card from your <span class="text-gold">Hand</span> on top of your <span class="text-gold">Draw Pile</span>.</div>
            <div class="card-footer">Uncommon</div>
        </div>
    </div>

    
</body>
</html>
