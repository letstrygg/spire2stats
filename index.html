
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Spire 2 Stats - Slay the Spire 2 Database</title>
    <link rel="stylesheet" href="/css/main.css">
    <style>
        body { background: #121212; color: #e0e0e0; font-family: sans-serif; padding: 40px; }

        .stats-summary { background: #1a1a1a; border: 1px solid #333; padding: 25px; border-radius: 12px; margin-bottom: 40px; max-width: 1200px; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 20px; }
        .stat-item { text-align: center; }
        .stat-label { font-size: 0.7rem; color: #888; text-transform: uppercase; margin-bottom: 8px; letter-spacing: 1px; }
        .stat-value { font-size: 1.4rem; font-weight: bold; color: #fff; }
        .stat-sub { font-size: 0.8rem; color: #666; font-weight: normal; margin-top: 4px; }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 15px; max-width: 1200px; }
        .item-link { background: #1a1a1a; border: 1px solid #333; padding: 30px; border-radius: 8px; text-decoration: none; color: inherit; font-weight: bold; font-size: 1.3rem; transition: all 0.2s; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .item-link:hover { border-color: #4a90e2; background: #222; transform: translateY(-3px); box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
    </style>
</head>
<body>
    <h1>Slay the Spire 2 Stats</h1>

    <div class="stats-summary">
        <div class="stats-grid">
            <div class="stat-item">
                <div class="stat-label">Total Runs</div>
                <div class="stat-value">46</div>
            </div>
            <div class="stat-item">
                <div class="stat-label">Wins / Losses</div>
                <div class="stat-value"><span style="color: #00ff89">24</span> <span style="color: #444">/</span> <span style="color: #ff4b4b">22</span></div>
            </div>
            <div class="stat-item">
                <div class="stat-label">Global Winrate</div>
                <div class="stat-value" style="color: #ffd700">52.2%</div>
            </div>
            <div class="stat-item">
                <div class="stat-label">Contributors</div>
                <div class="stat-value">1</div>
            </div>
            <div class="stat-item">
                <div class="stat-label">Last Updated</div>
                <div class="stat-value" style="font-size: 1.1rem;">March 31, 2026</div>
            </div>
        </div>
    </div>

    <div class="grid">
        <a href="/cards/" class="item-link"><div>Cards</div><div class="stat-sub">312 / 576</div></a><a href="/relics/" class="item-link">Relics</a><a href="/potions/" class="item-link">Potions</a><a href="/characters/" class="item-link">Characters</a><a href="/monsters/" class="item-link">Monsters</a><a href="/events/" class="item-link">Events</a><a href="/encounters/" class="item-link">Encounters</a><a href="/acts/" class="item-link">Acts</a><a href="/achievements/" class="item-link">Achievements</a><a href="/ascensions/" class="item-link">Ascensions</a><a href="/afflictions/" class="item-link">Afflictions</a><a href="/enchantments/" class="item-link">Enchantments</a><a href="/epochs/" class="item-link">Epochs</a><a href="/keywords/" class="item-link">Keywords</a><a href="/intents/" class="item-link">Intents</a><a href="/modifiers/" class="item-link">Modifiers</a><a href="/orbs/" class="item-link">Orbs</a><a href="/powers/" class="item-link">Powers</a><a href="/stories/" class="item-link">Stories</a>
    </div>
</body>
</html>
