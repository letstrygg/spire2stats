<style>
  /* Centering Container */
  .landing-wrapper {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 80vh; 
    padding: 0 20px; /* Slight margin on left/right */
  }

  /* Keep the grid constrained so it doesn't stretch too far */
  .landing-grid {
    width: 100%;
    max-width: 1400px;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 20px;
  }

  .feature-panel { display: flex; flex-direction: column; height: 100%; }
  .feature-content { padding: 20px; flex-grow: 1; display: flex; flex-direction: column; gap: 10px; }
  .feature-title { margin: 0; font-size: 1.4rem; display: flex; align-items: center; gap: 10px; }
  
  /* Expandable Details Styling */
  .expandable-info { margin-top: auto; border-top: 1px dashed var(--border); padding-top: 15px; }
  .expandable-info summary { cursor: pointer; font-weight: bold; color: var(--blue); outline: none; list-style: none; display: flex; align-items: center; justify-content: space-between; font-size: 0.9rem; user-select: none; }
  .expandable-info summary::-webkit-details-marker { display: none; }
  .expandable-info summary::after { content: "expand_more"; font-family: "Material Symbols Outlined"; font-size: 20px; transition: transform 0.2s; }
  .expandable-info[open] summary::after { transform: rotate(180deg); }
  .expandable-info p { margin: 15px 0 0 0; font-size: 0.95rem; line-height: 1.5; color: var(--gray); }
</style>

        <details class="expandable-info">

          <p>Card win rate statistics.</p>
        </details>
      </div>
    </div>

</div>
