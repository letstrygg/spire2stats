                    <script>
                    document.addEventListener("DOMContentLoaded", function() {

                        if (!ctx) return;
                        const rawRuns = [{"label":"Run #69 (Ironclad)","win":false,"floorData":[{"floor":1,"hp":64},{"floor":2,"hp":62},{"floor":3,"hp":59},{"floor":4,"hp":59},{"floor":5,"hp":53},{"floor":6,"hp":10},{"floor":7,"hp":0}]}];

                        const color = "#ff4b4b";

                        const hpMap = {};

                        const dataArr = labels.map(floor => hpMap[floor] !== undefined ? hpMap[floor] : null);

                            data: { labels: labels, datasets: [{

                                data: dataArr,

                                backgroundColor: color + '15',
                                borderWidth: 2,
                                fill: true,
                                tension: 0.3,
                                spanGaps: true
                            }]},
